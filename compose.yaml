services:
  rogue:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_PATH: /data/rogue.sqlite
      CONTENT_DIR: /app/content
    volumes:
      - rogue-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  rogue-data:
