schemaVersion: 7
entries:
  - kind: vault
    id: vault.town
    name: Town
    tags: [town]
    minDepth: 0
    maxDepth: 0
    rarity: common
    weight: 1
    maxPerFloor: 1
    margin: 0
    transforms:
      rotations: [0]
      reflectHorizontal: false
    layout:
      - "##################################"
      - "#...######....######...######....#"
      - "#...#.P..#....#.A..#...#.C..#....#"
      - "#...#..1.#....#..2.#...#..3.#....#"
      - "#................................#"
      - "#................................#"
      - "#................................#"
      - "#................................#"
      - "#..........4....S...5............#"
      - "#......................#########.#"
      - "#....+>................#.......#.#"
      - "#......................#.......#.#"
      - "#...............6......#.......#.#"
      - "#......................####D####.#"
      - "#................................#"
      - "##################################"
    legend:
      "#": { terrain: wall }
      ".": { terrain: floor }
      "+": { terrain: floor, entrance: true }
      ">":
        terrain: stair-down
        slot: { id: dungeon-entrance, kind: fixture, required: true, tags: [town, dungeon-entrance] }
      "D":
        terrain: closed-door
        slot: { id: house-door, kind: fixture, required: true, tags: [town, house-door] }
      "P":
        terrain: floor
        slot: { id: merchant-provisioner, kind: npc, required: true, tags: [town, merchant, provisioner] }
      "A":
        terrain: floor
        slot: { id: merchant-arms, kind: npc, required: true, tags: [town, merchant, arms] }
      "C":
        terrain: floor
        slot: { id: merchant-curios, kind: npc, required: true, tags: [town, merchant, curios] }
      "S":
        terrain: floor
        slot: { id: merchant-spellvendor, kind: npc, required: true, tags: [town, merchant, spellvendor] }
      "1":
        terrain: floor
        light: { idSuffix: provisioner-lamp, glyph: "1", presentationToken: fixture.lamp, color: [255, 179, 71], radius: 6, strength: 180 }
      "2":
        terrain: floor
        light: { idSuffix: arms-lamp, glyph: "2", presentationToken: fixture.lamp, color: [255, 179, 71], radius: 6, strength: 180 }
      "3":
        terrain: floor
        light: { idSuffix: curios-lamp, glyph: "3", presentationToken: fixture.lamp, color: [255, 179, 71], radius: 6, strength: 180 }
      "4":
        terrain: floor
        light: { idSuffix: walkway-lamp-west, glyph: "4", presentationToken: fixture.lamp, color: [255, 200, 120], radius: 7, strength: 180 }
      "5":
        terrain: floor
        light: { idSuffix: walkway-lamp-east, glyph: "5", presentationToken: fixture.lamp, color: [255, 200, 120], radius: 7, strength: 180 }
      "6":
        terrain: floor
        light: { idSuffix: walkway-lamp-south, glyph: "6", presentationToken: fixture.lamp, color: [255, 200, 120], radius: 7, strength: 180 }
