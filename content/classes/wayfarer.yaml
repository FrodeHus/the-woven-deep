schemaVersion: 6
entries:
  - kind: class
    id: class.wayfarer
    name: Wayfarer
    tags: [chargen, playable]
    description: A traveller equally at home with blade or bow, ready for whatever the deep demands.
    playable: true
    silhouetteGlyph: "W"
    unlockHint: null
    classTags: [wayfarer]
    kits:
      - kitId: blade
        name: Blade
        equipped:
          - { contentId: item.iron-sword, slot: main-hand }
          - { contentId: item.pitch-torch, slot: off-hand, enabled: true }
          - { contentId: item.leather-armor, slot: body }
        backpack:
          - { contentId: item.travel-ration, quantity: 3 }
          - { contentId: item.wooden-shield, quantity: 1 }
      - kitId: ranger
        name: Ranger
        # The hunting bow is two-handed and reserves off-hand, so the pitch
        # torch cannot be equipped alongside it. It rides in the backpack as
        # an unlit spare instead -- a deliberate light-versus-bow trade-off.
        equipped:
          - { contentId: item.hunting-bow, slot: main-hand }
          - { contentId: item.leather-armor, slot: body }
        backpack:
          - { contentId: item.wooden-arrows, quantity: 20 }
          - { contentId: item.pitch-torch, quantity: 1 }
          - { contentId: item.travel-ration, quantity: 3 }
